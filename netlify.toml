[build]
  command = "npm run build"
  publish = "dist"
```

That's literally it. Netlify will now run `npm run build` and serve the `dist/` folder instead of your raw source.

Also add a `_redirects` file inside your `public/` folder to fix React Router page refreshes:
```
/*    /index.html   200
```

---

**Then update your API URLs** the same way — since your Python backend is running locally it won't be reachable from Netlify's servers. You need to deploy the backend somewhere too (Railway/Render are the easiest), then use env variables:

In Netlify dashboard → **Site Settings → Environment Variables**, add:
```
VITE_API_URL = https://your-backend.railway.app